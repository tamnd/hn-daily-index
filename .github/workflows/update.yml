name: Update HN Daily Index

on:
  schedule:
    # Run at 23:55 UTC daily, near end of day so the top stories have
    # stabilized. GitHub Actions cron can delay up to ~15 min, but that
    # still lands within the same UTC day.
    - cron: "55 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync

      - run: uv run hn-daily-index

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/
          git diff --staged --quiet || git commit -m "Add $(date -u +%Y-%m-%d) top stories"
          git push
